<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>inspiration — dominika</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Hanken+Grotesk:wght@300;400;500&family=Italianno&display=swap" rel="stylesheet">
<style>
  :root {
    /* Wild Spirit — sage / sand / clay */
    --bone: #F2EBDF;
    --sand: #E8DBC1;
    --ink: #2C2820;
    --ink-soft: rgba(44, 40, 32, 0.62);
    --ink-line: rgba(44, 40, 32, 0.14);
    --terracotta: #6B7A4F;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-script: 'Italianno', cursive;
    --font-body: 'Hanken Grotesk', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bone);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  ::selection { background: rgba(107, 122, 79, 0.25); color: var(--ink); }

  .wrap { max-width: 1320px; margin: 0 auto; padding: 56px 28px 120px; }

  header.top {
    border-bottom: 1px solid var(--ink-line);
    padding-bottom: 28px;
    margin-bottom: 0;
  }
  h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(34px, 4.8vw, 56px);
    letter-spacing: 0.04em;
    line-height: 1;
    margin: 0;
    text-transform: uppercase;
  }
  h1 i {
    font-family: var(--font-script);
    font-style: normal;
    font-weight: 400;
    color: var(--terracotta);
    text-transform: none;
    font-size: 1.05em;
    letter-spacing: 0;
    margin-left: 6px;
    vertical-align: -0.02em;
  }
  .eyebrow { display: none; }
  .swatch-strip {
    height: 14px;
    margin: 22px 0 36px;
    border: 1px solid var(--ink-line);
    background: linear-gradient(to right,
      #6B7A4F 0% 14.28%, #A1A88A 14.28% 28.56%, #E8DBC1 28.56% 42.84%,
      #C9A87A 42.84% 57.12%, #B26449 57.12% 71.4%, #7A5A4A 71.4% 85.68%,
      #8FA6A8 85.68% 100%);
  }

  /* Add form */
  .add {
    background: var(--sand);
    padding: 26px 28px;
    border: 1px solid var(--ink-line);
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px 18px;
    align-items: start;
  }
  .add .row { display: flex; flex-direction: column; gap: 8px; }
  .add label {
    font-family: var(--font-body);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .add input[type="text"], .add textarea, .add select {
    background: var(--bone);
    border: 1px solid var(--ink-line);
    padding: 12px 14px;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    border-radius: 0;
    outline: none;
    width: 100%;
  }
  .add textarea { min-height: 60px; resize: vertical; line-height: 1.45; }
  .add input:focus, .add textarea:focus, .add select:focus {
    border-color: var(--ink);
  }
  .add .cats { display: flex; gap: 6px; flex-wrap: wrap; }
  .add .cat-chip {
    border: 1px solid var(--ink-line);
    background: var(--bone);
    padding: 8px 14px;
    font-size: 12px;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--ink);
    font-family: var(--font-body);
    transition: all 0.15s ease;
  }
  .add .cat-chip:hover { border-color: var(--ink); }
  .add .cat-chip.active {
    background: var(--ink);
    color: var(--bone);
    border-color: var(--ink);
  }
  .add .submit {
    align-self: end;
    background: var(--ink);
    color: var(--bone);
    border: none;
    padding: 14px 28px;
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    height: 46px;
  }
  .add .submit:hover { background: var(--terracotta); }
  .add .submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .add .err { color: var(--terracotta); font-size: 12px; grid-column: 1 / -1; }

  /* Filter tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--ink-line);
    overflow-x: auto;
  }
  .tab {
    background: none;
    border: none;
    padding: 14px 22px 16px;
    font-family: var(--font-body);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--terracotta);
  }
  .tab .count {
    font-size: 10px;
    color: var(--ink-soft);
    margin-left: 6px;
  }

  /* Masonry grid (CSS columns) */
  .grid {
    column-count: 3;
    column-gap: 24px;
  }
  @media (max-width: 1080px) { .grid { column-count: 2; } }
  @media (max-width: 680px)  { .grid { column-count: 1; } }

  .card {
    break-inside: avoid;
    margin-bottom: 24px;
    background: var(--bone);
    border: 1px solid var(--ink-line);
    position: relative;
    display: inline-block;
    width: 100%;
  }
  .card .ref-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--ink-line);
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .card .ref-label .cat-tag {
    color: var(--terracotta);
    font-weight: 500;
  }
  .card .ref-label .kebab {
    position: relative;
  }
  .card .ref-label .kebab > button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: var(--font-body);
    font-size: 18px;
    padding: 0 6px;
    line-height: 1;
    letter-spacing: 0.06em;
  }
  .card .ref-label .kebab > button:hover { color: var(--terracotta); }
  .menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--bone);
    border: 1px solid var(--ink-line);
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    min-width: 200px;
    z-index: 30;
    display: none;
  }
  .menu.on { display: block; }
  .menu .group-label {
    padding: 10px 14px 6px;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--ink-line);
  }
  .menu button.opt {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    padding: 11px 14px;
    font-family: var(--font-body);
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--ink);
    cursor: pointer;
    border-bottom: 1px solid var(--ink-line);
    text-transform: none;
  }
  .menu button.opt:last-child { border-bottom: none; }
  .menu button.opt:hover { background: var(--sand); }
  .menu button.opt.current { color: var(--ink-soft); cursor: default; }
  .menu button.opt.current:hover { background: none; }
  .menu button.danger { color: var(--terracotta); }
  .menu button.danger:hover { background: rgba(178,100,73,0.08); }

  .embed {
    position: relative;
    overflow: hidden;
    background: var(--sand);
  }
  .embed > blockquote.instagram-media,
  .embed > blockquote.tiktok-embed {
    margin: 0 auto !important;
    min-width: 0 !important;
    max-width: 100% !important;
    border: none !important;
    border-radius: 0 !important;
    box-shadow: none !important;
  }
  .embed iframe {
    width: 100%;
    border: 0;
    display: block;
  }
  .embed .yt-wrap {
    position: relative;
    width: 100%;
    padding-top: 177.77%; /* portrait default for shorts */
  }
  .embed .yt-wrap.landscape { padding-top: 56.25%; }
  .embed .yt-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .embed .pin-wrap iframe { width: 100%; min-height: 540px; }

  .embed .link-card {
    padding: 28px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .embed .link-card .url {
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    word-break: break-all;
    line-height: 1.5;
  }
  .embed .link-card .open {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--terracotta);
    text-decoration: none;
  }

  .card .note {
    padding: 14px 16px 16px;
    font-size: 13px;
    color: var(--ink);
    border-top: 1px solid var(--ink-line);
    line-height: 1.55;
  }
  .card .note .note-eyebrow {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .card .footer {
    padding: 10px 14px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-top: 1px solid var(--ink-line);
    display: flex;
    justify-content: space-between;
  }
  .card .footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-line);
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-soft);
    font-family: var(--font-body);
    font-size: 14px;
    letter-spacing: 0.04em;
  }

  .loading { text-align: center; padding: 60px 20px; color: var(--ink-soft); }

  /* Board tiles (home view) */
  .boards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }
  @media (max-width: 720px) { .boards { grid-template-columns: 1fr; } }
  .board-tile {
    border: 1px solid var(--ink-line);
    background: var(--bone);
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.15s ease;
    cursor: pointer;
    text-decoration: none;
    color: var(--ink);
  }
  .board-tile:hover { border-color: var(--ink); }
  .board-tile .head {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--ink-line);
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 14px;
  }
  .board-tile .head .name {
    font-family: var(--font-display); font-weight: 500;
    font-size: 30px; letter-spacing: 0.02em; line-height: 1;
    text-transform: uppercase;
  }
  .board-tile .head .count {
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft); white-space: nowrap;
  }
  .board-tile .cover {
    position: relative;
    aspect-ratio: 16 / 10;
    background: var(--sand);
    overflow: hidden;
  }
  .board-tile .cover img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .board-tile:hover .cover img { transform: scale(1.03); }
  .board-tile .cover::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(20,18,14,0.18) 100%);
    pointer-events: none;
  }
  .board-tile .foot {
    padding: 14px 22px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-soft);
    border-top: 1px solid var(--ink-line);
  }
  .board-tile .foot .open { color: var(--terracotta); }

  @media (max-width: 720px) {
    .wrap { padding: 36px 18px 80px; }
    .add { grid-template-columns: 1fr; }
    .add .submit { width: 100%; }
    .meta { text-align: left; }
  }

  .site-nav {
    display: flex; align-items: center; gap: 14px;
    padding: 0 0 22px;
    font-family: var(--font-body); font-weight: 400;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-soft);
  }
  .site-nav a { color: var(--ink-soft); transition: color 160ms ease; }
  .site-nav a:hover { color: var(--ink); }
  .site-nav a.active { color: var(--ink); }
  .site-nav .sep { color: var(--ink-line); }
  .site-nav .label {
    font-family: var(--font-display); font-weight: 500;
    font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink); margin-right: 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="site-nav" aria-label="dominika dashboards">
    <span class="label">dominika</span>
    <a href="./" class="active" aria-current="page">inspiration</a>
    <span class="sep">·</span>
    <a href="./calendar/">calendar</a>
  </nav>
  <header class="top">
    <h1>INSPIRATION <i>board.</i></h1>
  </header>
  <div class="swatch-strip" aria-hidden="true"></div>

  <form class="add" id="add-form" autocomplete="off">
    <div class="row">
      <label for="url">link</label>
      <input id="url" type="text" placeholder="paste an instagram, tiktok, pinterest, youtube or any url" required />
    </div>
    <div class="row" style="grid-row: span 2;">
      <label>what you love</label>
      <div class="cats" id="cat-chips">
        <button type="button" class="cat-chip" data-cat="text">text style</button>
        <button type="button" class="cat-chip" data-cat="edit">edit / colour</button>
        <button type="button" class="cat-chip" data-cat="concept">concept to shoot</button>
        <button type="button" class="cat-chip" data-cat="general">general feed</button>
      </div>
      <button class="submit" type="submit" id="submit-btn">add reference</button>
    </div>
    <div class="row">
      <label for="note">note (optional)</label>
      <textarea id="note" placeholder="what pulls you about it — colour, caption rhythm, framing, vibe"></textarea>
    </div>
    <div class="err" id="err"></div>
  </form>

  <div class="boards" id="boards">
    <div class="loading">loading…</div>
  </div>
</div>

<script type="module">
import { addItem, flushQueue } from './lib/sync.js';

const DATA = './data/items.json';
const BOARDS = [
  { key: 'text',    name: 'text style',    cover: 'covers/text.jpg' },
  { key: 'edit',    name: 'edit / colour', cover: 'covers/edit.jpg' },
  { key: 'concept', name: 'concept',       cover: 'covers/concept.jpg' },
  { key: 'general', name: 'general feed',  cover: 'covers/general.jpg' }
];

const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));
const state = { items: [], selectedCat: 'text' };

function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderBoards() {
  $('#boards').innerHTML = BOARDS.map(b => {
    const count = state.items.filter(i => i.category === b.key).length;
    return `<a class="board-tile" href="board.html?cat=${b.key}">
      <div class="head">
        <span class="name">${b.name}</span>
        <span class="count">${count} ref${count===1?'':'s'}</span>
      </div>
      <div class="cover"><img src="${b.cover}" alt="" loading="lazy" /></div>
      <div class="foot"><span>${b.name}</span><span class="open">open →</span></div>
    </a>`;
  }).join('');
}

async function load() {
  try {
    const r = await fetch(DATA + '?t=' + Date.now(), { cache: 'no-store' });
    const data = await r.json();
    state.items = data.items || [];
    renderBoards();
  } catch {
    $('#boards').innerHTML = `<div class="empty">couldn't load</div>`;
  }
  // best-effort flush any queued submissions from previous sessions
  flushQueue();
}

// chips
$('#cat-chips').addEventListener('click', e => {
  const btn = e.target.closest('.cat-chip');
  if (!btn) return;
  $$('.cat-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.selectedCat = btn.dataset.cat;
});
document.querySelector('.cat-chip[data-cat="text"]').classList.add('active');

// add form submit → optimistic local add + best-effort sync via proxy.
// dominika never sees infra-level errors; the queue catches anything
// the proxy can't take right now.
$('#add-form').addEventListener('submit', async e => {
  e.preventDefault();
  $('#err').textContent = '';
  const url = $('#url').value.trim();
  const note = $('#note').value.trim();
  const cat = state.selectedCat;
  if (!url) { $('#err').textContent = 'paste a link first'; return; }
  if (!cat) { $('#err').textContent = 'pick a category'; return; }
  try { new URL(url); } catch { $('#err').textContent = 'not a valid url'; return; }

  const btn = $('#submit-btn');
  btn.disabled = true; btn.textContent = 'saving…';

  const item = {
    id: 'i_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    url, note, category: cat,
    created_at: new Date().toISOString()
  };

  state.items.unshift(item);
  renderBoards();
  $('#url').value = ''; $('#note').value = '';

  try { new BroadcastChannel('dominika-inspo').postMessage({ type: 'item-added', item }); } catch {}

  addItem(item).then(({ synced }) => {
    if (synced) {
      btn.textContent = 'added ✓';
    } else {
      // server didn't accept it (worker down, network blip). The item is
      // queued in localStorage and will auto-flush on next page load.
      btn.textContent = 'saving…';
    }
  }).finally(() => {
    setTimeout(() => { btn.textContent = 'add reference'; btn.disabled = false; }, 1500);
  });
});

load();
</script>
</body>
</html>
